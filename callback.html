<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TikTok OAuth Callback - OpenClaw</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }
    .icon { font-size: 3rem; margin-bottom: 16px; }
    h1 { font-size: 1.5rem; margin-bottom: 8px; color: #111; }
    p { color: #666; margin-bottom: 24px; font-size: 0.95rem; line-height: 1.6; }
    .code-box {
      background: #f0f0f0;
      border: 2px solid #ddd;
      border-radius: 10px;
      padding: 16px 20px;
      font-family: monospace;
      font-size: 0.85rem;
      word-break: break-all;
      text-align: left;
      color: #111;
      margin-bottom: 16px;
      position: relative;
    }
    .label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .value {
      font-size: 1rem;
      font-weight: 600;
      color: #0070f3;
      word-break: break-all;
    }
    .copy-btn {
      display: inline-block;
      margin-top: 8px;
      padding: 10px 24px;
      background: #0f0f0f;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s;
    }
    .copy-btn:hover { background: #333; }
    .copy-btn.copied { background: #16a34a; }
    .step {
      background: #fffbeb;
      border: 1px solid #fcd34d;
      border-radius: 10px;
      padding: 16px 20px;
      text-align: left;
      margin-top: 24px;
      font-size: 0.88rem;
      color: #78350f;
      line-height: 1.7;
    }
    .step strong { color: #92400e; }
    .error-card { border-color: #fca5a5; background: #fff5f5; }
    .error-card .value { color: #dc2626; }
    a { color: #0070f3; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card" id="main-card">
    <div class="icon" id="icon">⏳</div>
    <h1 id="title">Processing...</h1>
    <p id="desc">Reading OAuth response from TikTok...</p>
    <div id="content"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const state = params.get('state');
    const error = params.get('error');
    const errorDesc = params.get('error_description');

    const icon = document.getElementById('icon');
    const title = document.getElementById('title');
    const desc = document.getElementById('desc');
    const content = document.getElementById('content');
    const card = document.getElementById('main-card');

    function copyToClipboard(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '✓ Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy';
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    if (error) {
      icon.textContent = '❌';
      title.textContent = 'Authorization Failed';
      desc.textContent = 'TikTok returned an error during authorization.';
      card.classList.add('error-card');
      content.innerHTML = `
        <div class="code-box">
          <div class="label">Error</div>
          <div class="value">${error}</div>
        </div>
        ${errorDesc ? `<div class="code-box">
          <div class="label">Description</div>
          <div class="value">${errorDesc}</div>
        </div>` : ''}
      `;
    } else if (code) {
      icon.textContent = '✅';
      title.textContent = 'Authorization Successful!';
      desc.textContent = 'Copy the code below and paste it into your terminal to exchange for an access token.';
      content.innerHTML = `
        <div class="code-box">
          <div class="label">Authorization Code</div>
          <div class="value" id="code-value">${code}</div>
          <br/>
          <button class="copy-btn" onclick="copyToClipboard('${code}', this)">Copy Code</button>
        </div>
        ${state ? `<div class="code-box">
          <div class="label">State</div>
          <div class="value">${state}</div>
        </div>` : ''}
        <div class="step">
          <strong>Bước tiếp:</strong> trong thư mục dự án OpenClaw (đã cấu hình <code>.env</code> với <code>TIKTOK_REDIRECT_URI</code> trùng URL trang này), chạy:<br/><br/>
          <code>python3 auth_tiktok.py --code "<strong>${code}</strong>"</code>
        </div>
      `;
    } else {
      icon.textContent = '⚠️';
      title.textContent = 'No Code Found';
      desc.textContent = 'This page is the OAuth callback endpoint for OpenClaw TikTok integration. It should only be accessed after TikTok authorization.';
      content.innerHTML = `
        <p><a href="./index.html">← Back to Home</a></p>
      `;
    }
  </script>
</body>
</html>
